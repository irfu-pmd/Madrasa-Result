<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ഓൺലൈൻ അഡ്മിഷൻ - അൻവാറുൽ ഇസ്ലാം മദ്രസ</title>
    <style>
        :root { --primary: #065279; --gold: #d4af37; --bg: #f0f4f8; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .form-container { 
            background: white; max-width: 600px; margin: 0 auto; 
            padding: 30px; border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 8px solid var(--primary);
        }
        h2 { color: var(--primary); text-align: center; margin-bottom: 5px; }
        .sub-text { text-align: center; font-size: 14px; color: #666; margin-bottom: 25px; }
        
        .input-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #333; font-size: 14px; }
        input, select, textarea { 
            width: 100%; padding: 12px; border: 2px solid #ddd; 
            border-radius: 10px; box-sizing: border-box; font-size: 16px;
        }
        input[readonly] { background-color: #f9f9f9; cursor: not-allowed; color: #666; }
        
        .row { display: flex; gap: 10px; }
        .row .input-group { flex: 1; }

        button { 
            background: #2e7d32; color: white; width: 100%; 
            padding: 15px; border: none; border-radius: 10px; 
            font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px;
            box-shadow: 0 4px 10px rgba(46, 125, 50, 0.3);
        }
        .back-link { display: block; text-align: center; margin-top: 20px; color: var(--primary); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>ഓൺലൈൻ അഡ്മിഷൻ</h2>
    <div class="sub-text">അൻവാറുൽ ഇസ്ലാം മദ്രസ, താഴെ പുല്ലുംകുന്ന്</div>
    
    <div class="input-group">
        <label>മദ്രസയുടെ പേരും അംഗീകാര നമ്പറും (Name & Recog. No.)</label>
        <input type="text" id="madrasaInfo" value="അൻവാറുൽ ഇസ്ലാം മദ്രസ - 6948" readonly>
    </div>

    <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

    <div class="input-group">
        <label>വിദ്യാർത്ഥിയുടെ പേരും ഇനിഷ്യലും (Name of Student with initials)</label>
        <input type="text" id="studentName" placeholder="പേര് ടൈപ്പ് ചെയ്യുക">
    </div>

    <div class="input-group">
        <label>വീട്ടുപേരും വിലാസവും (House Name & Address)</label>
        <textarea id="address" rows="2" placeholder="പൂർണ്ണമായ വിലാസം"></textarea>
    </div>

    <div class="row">
        <div class="input-group">
            <label>ആധാർ നമ്പർ (Aadhaar No)</label>
            <input type="number" id="aadhaar" placeholder="Aadhaar Number">
        </div>
        <div class="input-group">
            <label>ലിംഗം (Sex)</label>
            <select id="sex">
                <option value="ആൺകുട്ടി">ആൺകുട്ടി (Male)</option>
                <option value="പെൺകുട്ടി">പെൺകുട്ടി (Female)</option>
            </select>
        </div>
    </div>

    <div class="row">
        <div class="input-group">
            <label>ജനന തീയതി (Date of Birth)</label>
            <input type="date" id="dob">
        </div>
        <div class="input-group">
            <label>പിതാവിന്റെ പേര് (Father's Name)</label>
            <input type="text" id="fatherName" placeholder="പിതാവിന്റെ പേര്">
        </div>
    </div>

    <div class="row">
        <div class="input-group">
            <label>രക്ഷാകർത്താവിന്റെ പേര് (Guardian Name)</label>
            <input type="text" id="guardianName" placeholder="രക്ഷാകർത്താവ്">
        </div>
        <div class="input-group">
            <label>ഫോൺ നമ്പർ (Phone No)</label>
            <input type="tel" id="phone" placeholder="Phone Number">
        </div>
    </div>

    <div class="row">
        <div class="input-group">
            <label>ചേരുന്ന ക്ലാസ്സ് (Std to which admitted)</label>
            <select id="std">
                <option value="1">1</option><option value="2">2</option><option value="3">3</option>
                <option value="4">4</option><option value="5">5</option><option value="6">6</option>
                <option value="7">7</option><option value="8">8</option>
            </select>
        </div>
        <div class="input-group">
            <label>ടി.സി നമ്പർ (T.C. No - if any)</label>
            <input type="text" id="tcNo" placeholder="ടി.സി നമ്പർ">
        </div>
    </div>

    <button onclick="submitAdmission()">അപേക്ഷ സമർപ്പിക്കാം (Submit)</button>
    
    <a href="index.html" class="back-link">← തിരികെ ഹോം പേജിലേക്ക്</a>
</div>

<script>
    function submitAdmission() {
        const mInfo = document.getElementById('madrasaInfo').value;
        const sName = document.getElementById('studentName').value;
        const addr = document.getElementById('address').value;
        const aadh = document.getElementById('aadhaar').value;
        const sex = document.getElementById('sex').value;
        const dob = document.getElementById('dob').value;
        const father = document.getElementById('fatherName').value;
        const guardian = document.getElementById('guardianName').value;
        const phone = document.getElementById('phone').value;
        const std = document.getElementById('std').value;
        const tc = document.getElementById('tcNo').value || "Nil";

        if(!sName || !phone || !dob) {
            alert("ദയവായി പേര്, ജനന തീയതി, ഫോൺ നമ്പർ എന്നിവ പൂരിപ്പിക്കുക.");
            return;
        }

        const msg = `*പുതിയ മദ്രസ അഡ്മിഷൻ അപേക്ഷ*%0A%0A` +
                    `*മദ്രസ:* ${mInfo}%0A` +
                    `*വിദ്യാർത്ഥി:* ${sName}%0A` +
                    `*ലിംഗം:* ${sex}%0A` +
                    `*വിലാസം:* ${addr}%0A` +
                    `*ആധാർ:* ${aadh}%0A` +
                    `*ജനന തീയതി:* ${dob}%0A` +
                    `*പിതാവ്:* ${father}%0A` +
                    `*രക്ഷാകർത്താവ്:* ${guardian}%0A` +
                    `*ഫോൺ:* ${phone}%0A` +
                    `*ക്ലാസ്സ്:* ${std}%0A` +
                    `*ടി.സി നമ്പർ:* ${tc}`;

        window.open(`https://wa.me/919061969505?text=${msg}`, '_blank');
    }
</script>

</body>
</html>
