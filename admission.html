<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ഓൺലൈൻ അഡ്മിഷൻ - അൻവാറുൽ ഇസ്‌ലാം മദ്രസ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #065279; --gold: #d4af37; --bg: #f0f4f8; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        
        .form-container { 
            background: white; max-width: 700px; margin: 0 auto; 
            padding: 30px; border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 8px solid var(--primary);
        }
        
        .header-icon { text-align: center; color: var(--gold); font-size: 40px; margin-bottom: 10px; }
        h2 { color: var(--primary); text-align: center; margin-bottom: 5px; font-size: 24px; line-height: 1.4; }
        .sub-text { text-align: center; font-size: 13px; color: #666; margin-bottom: 25px; font-weight: bold; }
        
        .input-group { margin-bottom: 18px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #333; font-size: 13px; }
        label i { color: var(--primary); margin-right: 5px; width: 16px; text-align: center; }
        .req { color: red; } 
        
        input, select, textarea { 
            width: 100%; padding: 12px; border: 2px solid #e0e0e0; 
            border-radius: 10px; box-sizing: border-box; font-size: 14px;
            transition: 0.3s;
        }
        input:focus, select:focus, textarea:focus { border-color: var(--primary); outline: none; }
        input[readonly] { background-color: #f1f2f6; cursor: not-allowed; color: #555; font-weight: bold; border-color: #ddd; }
        
        .row { display: flex; gap: 15px; }
        .row .input-group { flex: 1; margin-bottom: 15px; }

        @media (max-width: 600px) {
            .row { flex-direction: column; gap: 0; }
        }

        .section-title {
            background: #e8f4f8; color: var(--primary); padding: 10px; border-radius: 8px; font-weight: bold; margin: 25px 0 15px 0; font-size: 15px; border-left: 4px solid var(--gold);
        }

        button { 
            background: #25D366; color: white; width: 100%; 
            padding: 16px; border: none; border-radius: 12px; 
            font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 15px;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3); display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        button:hover { background: #20bd5a; }

        .back-link { 
            display: block; text-align: center; margin-top: 25px; 
            color: var(--primary); text-decoration: none; font-weight: bold; 
            padding: 10px; border-radius: 10px; background: #f8f9fa;
        }
    </style>
</head>
<body>

<div class="form-container">
    <div class="header-icon"><i class="fa-solid fa-graduation-cap"></i></div>
    <h2>സമസ്ത കേരള ഇസ്‌ലാം മത വിദ്യാഭ്യാസ ബോർഡ്<br><span style="font-size: 18px; color:#444;">അഡ്മിഷൻ ഫോം</span></h2>
    <div class="sub-text">അൻവാറുൽ ഇസ്‌ലാം മദ്രസ, താഴെ പുല്ലുംകുന്ന്</div>
    
    <div class="input-group">
        <label><i class="fa-solid fa-school"></i> 1. മദ്രസയുടെ പേരും അംഗീകാര നമ്പറും (Name & Recog. No.)</label>
        <input type="text" id="madrasaInfo" value="അൻവാറുൽ ഇസ്‌ലാം മദ്രസ - 6948" readonly>
    </div>

    <div class="section-title">വിദ്യാർത്ഥിയുടെ വിവരങ്ങൾ</div>

    <div class="input-group">
        <label><i class="fa-solid fa-user"></i> 2. വിദ്യാർത്ഥിയുടെ പേരും, ഇനിഷ്യലും (Name of Student) <span class="req">*</span></label>
        <input type="text" id="studentName" placeholder="കുട്ടിയുടെ പൂർണ്ണമായ പേര്">
    </div>

    <div class="input-group">
        <label><i class="fa-solid fa-house-chimney"></i> 3. വീട്ടുപേര്, വിലാസം (House Name & Address)</label>
        <textarea id="address" rows="3" placeholder="പൂർണ്ണമായ വിലാസം"></textarea>
    </div>

    <div class="row">
        <div class="input-group">
            <label><i class="fa-regular fa-address-card"></i> 4. ആധാർ നമ്പർ (Aadhaar No)</label>
            <input type="number" id="aadhaar" placeholder="ആധാർ നമ്പർ">
        </div>
        <div class="input-group">
            <label><i class="fa-solid fa-venus-mars"></i> 6. ലിംഗം (Sex) <span class="req">*</span></label>
            <select id="sex">
                <option value="ആൺകുട്ടി">ആൺകുട്ടി (Male)</option>
                <option value="പെൺകുട്ടി">പെൺകുട്ടി (Female)</option>
            </select>
        </div>
    </div>

    <div class="row">
        <div class="input-group">
            <label><i class="fa-solid fa-calendar-days"></i> 5. ജനന തിയ്യതി (Date of Birth) <span class="req">*</span></label>
            <input type="date" id="dob">
        </div>
        <div class="input-group">
            <label><i class="fa-solid fa-fingerprint"></i> 11. അടയാളങ്ങൾ (Identification Marks)</label>
            <input type="text" id="marks" placeholder="ശരീരത്തിലെ അടയാളം (Optional)">
        </div>
    </div>

    <div class="section-title">രക്ഷിതാവിന്റെ വിവരങ്ങൾ</div>

    <div class="row">
        <div class="input-group">
            <label><i class="fa-solid fa-person"></i> 7. പിതാവിന്റെ പേര് (Name of Father)</label>
            <input type="text" id="fatherName" placeholder="ഉപ്പയുടെ പേര്">
        </div>
        <div class="input-group">
            <label><i class="fa-solid fa-user-tie"></i> 8. രക്ഷാകർത്താവിന്റെ പേര് (Guardian)</label>
            <input type="text" id="guardianName" placeholder="രക്ഷിതാവിന്റെ പേര്">
        </div>
    </div>

    <div class="row">
        <div class="input-group">
            <label><i class="fa-solid fa-people-arrows"></i> 9. കുട്ടിയുമായുള്ള ബന്ധം</label>
            <input type="text" id="relation" placeholder="ഉദാ: പിതാവ്, മാതാവ്, വലിയുപ്പ">
        </div>
        <div class="input-group">
            <label><i class="fa-solid fa-briefcase"></i> 10. പ്രവൃത്തി (Occupation)</label>
            <input type="text" id="occupation" placeholder="ജോലി">
        </div>
    </div>

    <div class="input-group">
        <label><i class="fa-solid fa-phone"></i> ഫോൺ നമ്പർ (Phone No) <span class="req">*</span></label>
        <input type="tel" id="phone" placeholder="വാട്സാപ്പ് നമ്പർ">
    </div>

    <div class="section-title">അഡ്മിഷൻ വിവരങ്ങൾ</div>

    <div class="row">
        <div class="input-group">
            <label><i class="fa-solid fa-book-open"></i> 13. ചേരുന്ന ക്ലാസ് (Std to which admitted) <span class="req">*</span></label>
            <select id="std">
                <option value="1">ക്ലാസ്സ് 1</option><option value="2">ക്ലാസ്സ് 2</option>
                <option value="3">ക്ലാസ്സ് 3</option><option value="4">ക്ലാസ്സ് 4</option>
                <option value="5">ക്ലാസ്സ് 5</option><option value="6">ക്ലാസ്സ് 6</option>
                <option value="7">ക്ലാസ്സ് 7</option><option value="8">ക്ലാസ്സ് 8</option>
            </select>
        </div>
        <div class="input-group">
            <label><i class="fa-solid fa-file-lines"></i> 16. ടി.സി നമ്പർ (T.C. No)</label>
            <input type="text" id="tcNo" placeholder="ഉണ്ടെങ്കിൽ മാത്രം">
        </div>
    </div>

    <div class="input-group">
        <label><i class="fa-solid fa-clock-rotate-left"></i> 14. മുൻ മദ്രസയുടെ പേരും അംഗീകാര നമ്പറും</label>
        <textarea id="formerMadrasa" rows="2" placeholder="മറ്റ് മദ്രസയിൽ പഠിച്ചിരുന്നെങ്കിൽ മാത്രം പൂരിപ്പിക്കുക"></textarea>
    </div>

    <div class="input-group">
        <label><i class="fa-solid fa-award"></i> 15. പൊതുപരീക്ഷ സർട്ടിഫിക്കറ്റ് നമ്പറും ക്ലാസ്സും</label>
        <input type="text" id="publicExam" placeholder="പൊതുപരീക്ഷ പാസ്സായിട്ടുണ്ടെങ്കിൽ മാത്രം">
    </div>

    <button onclick="submitAdmission()"><i class="fa-brands fa-whatsapp" style="font-size:24px;"></i> അപേക്ഷ വാട്സാപ്പിൽ അയക്കുക</button>
    
    <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> തിരികെ ഹോം പേജിലേക്ക് പോവാം</a>
</div>

<script>
    function submitAdmission() {
        // Collect all data
        const sName = document.getElementById('studentName').value;
        const addr = document.getElementById('address').value || "നൽകിയിട്ടില്ല";
        const aadh = document.getElementById('aadhaar').value || "നൽകിയിട്ടില്ല";
        const sex = document.getElementById('sex').value;
        const dob = document.getElementById('dob').value;
        const marks = document.getElementById('marks').value || "നൽകിയിട്ടില്ല";
        
        const father = document.getElementById('fatherName').value || "നൽകിയിട്ടില്ല";
        const guardian = document.getElementById('guardianName').value || "നൽകിയിട്ടില്ല";
        const relation = document.getElementById('relation').value || "നൽകിയിട്ടില്ല";
        const occupation = document.getElementById('occupation').value || "നൽകിയിട്ടില്ല";
        const phone = document.getElementById('phone').value;

        const std = document.getElementById('std').value;
        const tc = document.getElementById('tcNo').value || "ഇല്ല";
        const former = document.getElementById('formerMadrasa').value || "ബാധകമല്ല";
        const pExam = document.getElementById('publicExam').value || "ബാധകമല്ല";

        // Required field validation
        if(!sName || !phone || !dob) {
            alert("ദയവായി വിദ്യാർത്ഥിയുടെ പേര്, ജനന തിയ്യതി, ഫോൺ നമ്പർ എന്നിവ നിർബന്ധമായും പൂരിപ്പിക്കുക.");
            return;
        }

        // WhatsApp Message formatting
        const msg = `📝 *മദ്രസ അഡ്മിഷൻ ഫോം* 📝%0A` +
                    `-----------------------------------%0A` +
                    `1. മദ്രസ: അൻവാറുൽ ഇസ്‌ലാം മദ്രസ (6948)%0A` +
                    `2. വിദ്യാർത്ഥി: *${sName}*%0A` +
                    `3. വിലാസം: ${addr}%0A` +
                    `4. ആധാർ: ${aadh}%0A` +
                    `5. ജനന തിയ്യതി: ${dob}%0A` +
                    `6. ലിംഗം: ${sex}%0A` +
                    `7. പിതാവ്: ${father}%0A` +
                    `8. രക്ഷാകർത്താവ്: ${guardian}%0A` +
                    `9. ബന്ധം: ${relation}%0A` +
                    `10. പ്രവൃത്തി: ${occupation}%0A` +
                    `*ഫോൺ നമ്പർ:* ${phone}%0A` +
                    `11. അടയാളം: ${marks}%0A` +
                    `13. ചേരുന്ന ക്ലാസ്സ്: *${std}*%0A` +
                    `14. മുൻ മദ്രസ: ${former}%0A` +
                    `15. പൊതുപരീക്ഷ: ${pExam}%0A` +
                    `16. ടി.സി: ${tc}%0A` +
                    `-----------------------------------`;

        window.open(`https://wa.me/919061969505?text=${msg}`, '_blank');
    }
</script>

</body>
</html>
