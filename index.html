    <style>
        :root {
            --primary: #065279;
            --gold: #d4af37;
            --success: #27ae60;
        }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #f0f4f8 url('https://www.transparenttextures.com/patterns/islamic-art.png');
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; padding: 20px;
            animation: fadeInBody 1.5s ease;
        }
        @keyframes fadeInBody { from { opacity: 0; } to { opacity: 1; } }

        .container { 
            background: rgba(255, 255, 255, 0.98); 
            padding: 40px; border-radius: 30px; 
            box-shadow: 0 25px 70px rgba(0,0,0,0.2); 
            width: 100%; max-width: 450px; text-align: center; 
            border: 3px solid var(--gold);
            position: relative;
            transform: scale(1);
            transition: transform 0.3s;
        }
        .container:hover { transform: scale(1.01); }

        .top-icon { width: 70px; margin-bottom: 10px; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        h2 { color: var(--primary); font-size: 24px; margin: 10px 0; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); }
        .sub-txt { color: #d35400; font-weight: bold; margin-bottom: 25px; }

        .input-group { text-align: left; margin-bottom: 15px; }
        label { font-weight: bold; color: #444; display: block; margin-bottom: 5px; }
        select, input { 
            width: 100%; padding: 14px; border: 2px solid #ddd; 
            border-radius: 12px; font-size: 16px; outline: none; transition: 0.3s;
        }
        select:focus, input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(6, 82, 121, 0.2); }

        button { 
            background: linear-gradient(45deg, var(--primary), #0a7fb3); 
            color: white; padding: 16px; border: none; border-radius: 12px; 
            width: 100%; margin-top: 15px; cursor: pointer; 
            font-size: 18px; font-weight: bold; transition: 0.4s;
        }
        button:hover { background: linear-gradient(45deg, #0a7fb3, var(--primary)); letter-spacing: 1px; }

        #result { margin-top: 30px; display: none; }
        .result-card { 
            padding: 25px; border-radius: 20px; border: 2px solid var(--gold);
            background: #fff; animation: zoomIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes zoomIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .winner-name { font-size: 22px; color: var(--success); font-weight: bold; margin: 10px 0; }
        .whatsapp-btn { 
            background: #25D366; color: white; padding: 12px 20px; 
            text-decoration: none; border-radius: 50px; 
            display: inline-block; margin-top: 15px; font-weight: bold;
        }
    </style>
</head>
