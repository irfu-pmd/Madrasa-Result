<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>അൻവാറുൽ ഇസ്ലാം മദ്രസ - പരീക്ഷാ ഫലം</title>
    <style>
        :root {
            --primary: #065279;
            --gold: #d4af37;
            --success: #27ae60;
            --bg-gradient: linear-gradient(135deg, #74b9ff 0%, #a29bfe 100%);
        }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg-gradient);
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; padding: 20px;
            animation: fadeInBody 1.5s ease-in-out;
        }
        @keyframes fadeInBody { from { opacity: 0; } to { opacity: 1; } }

        .container { 
            background: rgba(255, 255, 255, 0.98); 
            padding: 40px; border-radius: 30px; 
            box-shadow: 0 25px 70px rgba(0,0,0,0.25); 
            width: 100%; max-width: 450px; text-align: center; 
            border: 4px solid var(--gold);
            position: relative;
            overflow: hidden;
            transform: translateY(0);
            transition: transform 0.3s;
        }
        .container:hover { transform: translateY(-5px); }

        /* HD ലോഗോയ്ക്കുള്ള സ്ഥലം */
        .logo-container { width: 120px; margin: 0 auto 15px auto; display: block; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
        .logo-container img { width: 100%; height: auto; object-fit: contain; }

        h2 { color: var(--primary); font-size: 26px; margin: 10px 0; font-weight: 800; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); }
        .sub-txt { color: #d35400; font-weight: bold; margin-bottom: 30px; letter-spacing: 1px; }

        .input-group { text-align: left; margin-bottom: 20px; animation: slideIn 0.8s ease-out; }
        @keyframes slideIn { from { transform: translateX(-30px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        label { font-weight: bold; color: #444; display: block; margin-bottom: 8px; }
        select, input { 
            width: 100%; padding: 15px; border: 2px solid #ddd; 
            border-radius: 12px; font-size: 16px; outline: none; transition: 0.3s;
        }
        select:focus, input:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(6, 82, 121, 0.2); }

        button { 
            background: linear-gradient(45deg, var(--primary), #1a7fb3); 
            color: white; padding: 18px; border: none; border-radius: 15px; 
            width: 100%; margin-top: 15px; cursor: pointer; 
            font-size: 18px; font-weight: bold; transition: 0.4s;
            box-shadow: 0 8px 15px rgba(6, 82, 121, 0.2);
        }
        button:hover { background: linear-gradient(45deg, #1a7fb3, var(--primary)); transform: translateY(-3px); box-shadow: 0 12px 25px rgba(6, 82, 121, 0.3); }

        #result { margin-top: 35px; display: none; }
        .result-card { 
            padding: 30px; border-radius: 20px; border: 3px solid var(--gold);
            background: #fff; animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 15px 35px rgba(212, 175, 55, 0.25);
        }
        @keyframes popIn { from { transform: scale(0.6); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .winner-name { font-size: 26px; color: var(--success); font-weight: 800; margin: 15px 0; }
        .whatsapp-btn { 
            background: #25D366; color: white; padding: 12px 25px; 
            text-decoration: none; border-radius: 50px; 
            display: inline-block; margin-top: 25px; font-weight: bold;
            font-size: 16px; transition: 0.3s;
        }
        .whatsapp-btn:hover { background: #1ebe57; transform: scale(1.05); }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-container">
        <img src="https://irfu-pmd.github.io/Madrasa-Result/Madrasa-Logo.png" alt="Anwarul Islam Madrasa Logo">
    </div>
    <h2>അൻവാറുൽ ഇസ്ലാം മദ്രസ</h2>
    <div class="sub-txt">Annual Exam Results 2025-26</div>
    
    <div class="input-group">
        <label>ക്ലാസ്സ് തിരഞ്ഞെടുക്കുക</label>
        <select id="class">
            <option value="">-- തിരഞ്ഞെടുക്കുക --</option>
            <option value="1">Class 1</option>
            <option value="2">Class 2</option>
            <option value="3">Class 3</option>
            <option value="4">Class 4</option>
            <option value="6">Class 6</option>
            <option value="8">Class 8</option>
        </select>
    </div>

    <div class="input-group">
        <label>പേര് നൽകുക (Malayalam or English)</label>
        <input type="text" id="studentName" placeholder="Eg: Faizan / ഫൈസാൻ">
    </div>

    <button onclick="checkResult()">RESULT കാണാം</button>

    <div id="result"></div>
</div>

<script>
    // രണ്ട് ഭാഷയിലുള്ള ലിസ്റ്റ്
    const winners = {
        "1": [
            {en: "Muhammed Faizan PV", ml: "മുഹമ്മദ് ഫൈസാൻ PV"},
            {en: "Muhammed Rihan CK", ml: "മുഹമ്മദ് റിഹാൻ CK"},
            {en: "Muhammed Jalaludheen TT", ml: "മുഹമ്മദ് ജലാലുദ്ദീൻ TT"},
            {en: "Fathima Issah P", ml: "ഫാത്തിമ ഇസ്സ P"},
            {en: "Fathima Hadiya TT", ml: "ഫാത്തിമ ഹാദിയ TT"}
        ],
        "2": [
            {en: "Muhammed Saihan K", ml: "മുഹമ്മദ് സൈഹാൻ K"},
            {en: "Muhammed Ashmil PT", ml: "മുഹമ്മദ് അഷ്മിൽ PT"},
            {en: "Fathima Sumayya TT", ml: "ഫാത്തിമ സുമയ്യ TT"},
            {en: "Khadija Liyana", ml: "ഖദീജ ലിയാന"}
        ],
        "3": [
            {en: "Haswa Fathima", ml: "ഹസ്‌വ ഫാത്തിമ"},
            {en: "Ayisha Sabrin K", ml: "ആയിഷ സബ്രിൻ K"}
        ],
        "4": [
            {en: "Muhammed Hadi PV", ml: "മുഹമ്മദ് ഹാദി PV"},
            {en: "Muhammed Aman C", ml: "മുഹമ്മദ് അമാൻ C"},
            {en: "Haya Fathima PM", ml: "ഹയ ഫാത്തിമ PM"},
            {en: "Ansila Mehrin V", ml: "അൻസില മെഹ്റിൻ V"},
            {en: "Midha Abdul Kalam P", ml: "മിദ്ഹ അബ്ദുൽ കലാം P"},
            {en: "Ayisha Nuha K", ml: "ആയിഷ നുഹ K"}
        ],
        "6": [
            {en: "Haniya Fathima A", ml: "ഹനിയ ഫാത്തിമ A"},
            {en: "Fathima Shahala VT", ml: "ഫാത്തിമ ഷഹല VT"},
            {en: "Asiya Naila P", ml: "ആസിയ നൈല P"},
            {en: "Fathima Rafa TP", ml: "ഫാത്തിമ റഫ TP"}
        ],
        "8": [
            {en: "Muhammed Anas PM", ml: "മുഹമ്മദ് അനസ് PM"},
            {en: "Muhammed Swalih K", ml: "മുഹമ്മദ് സ്വാലിഹ് K"},
            {en: "Fathima Hilfa PT", ml: "ഫാത്തിമ ഹിൽഫ PT"},
            {en: "Fathima Rinsha TT", ml: "ഫാത്തിമ റിൻഷ TT"}
        ]
    };

    function checkResult() {
        const classVal = document.getElementById('class').value;
        const input = document.getElementById('studentName').value.trim().toLowerCase();
        const resultDiv = document.getElementById('result');

        if (!classVal || !input) {
            alert("ദയവായി ക്ലാസ്സും പേരും നൽകുക.");
            return;
        }

        const classList = winners[classVal] || [];
        const student = classList.find(s => s.en.toLowerCase().includes(input) || s.ml.includes(input));

        resultDiv.style.display = 'block';
        if (student) {
            const msg = encodeURIComponent(`അഭിനന്ദനങ്ങൾ! അൻവാറുൽ ഇസ്ലാം മദ്രസ പരീക്ഷയിൽ ${student.ml} വിജയിച്ചിരിക്കുന്നു! 🎉🏆`);
            resultDiv.innerHTML = `
                <div class="result-card">
                    <span style="font-size: 60px;">🏆</span>
                    <h3>അഭിനന്ദനങ്ങൾ!</h3>
                    <div class="winner-name">${student.ml}</div>
                    <p style="color:#555; font-size:18px;">വാർഷിക പരീക്ഷയിൽ മികച്ച വിജയം കൈവരിച്ചിരിക്കുന്നു.</p>
                    <a class="whatsapp-btn" href="https://wa.me/?text=${msg}" target="_blank">വാട്സാപ്പിൽ പങ്കുവെക്കാം</a>
                </div>
            `;
        } else {
            resultDiv.innerHTML = `
                <div class="result-card" style="border-color:#e74c3c; box-shadow: 0 10px 25px rgba(231, 76, 60, 0.15);">
                    <span style="font-size: 45px;">🔍</span><br>
                    <p style="color:#c0392b; font-weight:bold;">ക്ഷമിക്കണം, ഈ പേര് വിജയികളുടെ ലിസ്റ്റിൽ കണ്ടെത്താനായില്ല. സ്പെല്ലിംഗ് ഒന്ന് കൂടി പരിശോധിക്കുമല്ലോ.</p>
                </div>`;
        }
    }
</script>
</body>
</html>
