<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>അൻവാറുൽ ഇസ്ലാം മദ്രസ - പരീക്ഷാ ഫലം</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #eef2f3; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; }
        h2 { color: #1a5f7a; margin-bottom: 10px; }
        .sub-title { color: #555; margin-bottom: 25px; font-size: 14px; }
        label { display: block; text-align: left; margin: 15px 0 5px; font-weight: bold; color: #333; }
        select, input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; margin-bottom: 10px; }
        button { background-color: #1a5f7a; color: white; padding: 15px; border: none; border-radius: 10px; width: 100%; margin-top: 20px; cursor: pointer; font-size: 18px; font-weight: bold; transition: 0.3s; }
        button:hover { background-color: #134b61; }
        #result { margin-top: 25px; padding: 20px; border-radius: 12px; display: none; line-height: 1.6; }
        .winner { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .not-found { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .whatsapp-btn { background-color: #25D366; color: white; padding: 10px; text-decoration: none; border-radius: 8px; display: inline-block; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>അൻവാറുൽ ഇസ്ലാം മദ്രസ</h2>
    <div class="sub-title">വാർഷിക പരീക്ഷാ വിജയികൾ 2025-26</div>
    
    <label>ക്ലാസ്സ് തിരഞ്ഞെടുക്കുക</label>
    <select id="class">
        <option value="">--Select Class--</option>
        <option value="1">Class 1</option>
        <option value="2">Class 2</option>
        <option value="3">Class 3</option>
        <option value="4">Class 4</option>
        <option value="6">Class 6</option>
        <option value="8">Class 8</option>
    </select>

    <label>കുട്ടിയുടെ പേര് നൽകുക</label>
    <input type="text" id="studentName" placeholder="ഉദാഹരണത്തിന്: മിദ്ഹ">

    <button onclick="checkResult()">Result നോക്കാം</button>

    <div id="result"></div>
</div>

<script>
    const winners = {
        "1": ["മുഹമ്മദ് ഫൈസാൻ PV", "മുഹമ്മദ് റിഹാൻ CK", "മുഹമ്മദ് ജലാലുദ്ദീൻ TT", "ഫാത്തിമ ഇസ്സ P", "ഫാത്തിമ ഹാദിയ TT"],
        "2": ["മുഹമ്മദ് സൈഹാൻ K", "മുഹമ്മദ് അഷ്മിൽ PT", "ഫാത്തിമ സുമയ്യ TT", "ഖദീജ ലിയാന"],
        "3": ["ഹസ്‌വ ഫാത്തിമ", "ആയിഷ സബ്രിൻ K"],
        "4": ["മുഹമ്മദ് ഹാദി PV", "മുഹമ്മദ് അമാൻ C", "ഹയ ഫാത്തിമ PM", "അൻസില മെഹ്റിൻ V", "മിദ്ഹ അബ്ദുൽ കലാം P", "ആയിഷ നുഹ K"],
        "6": ["ഹനിയ ഫാത്തിമ A", "ഫാത്തിമ ഷഹല VT", "ആസിയ നൈല P", "ഫാത്തിമ റഫ TP"],
        "8": ["മുഹമ്മദ് അനസ് PM", "മുഹമ്മദ് സ്വാലിഹ് K", "ഫാത്തിമ ഹിൽഫ PT", "ഫാത്തിമ റിൻഷ TT"]
    };

    function checkResult() {
        const classVal = document.getElementById('class').value;
        const nameVal = document.getElementById('studentName').value.trim();
        const resultDiv = document.getElementById('result');

        if (!classVal || !nameVal) {
            alert("ദയവായി ക്ലാസ്സും പേരും നൽകുക.");
            return;
        }

        const classWinners = winners[classVal] || [];
        const matchedName = classWinners.find(name => name.toLowerCase().includes(nameVal.toLowerCase()));

        resultDiv.style.display = 'block';
        if (matchedName) {
            resultDiv.className = 'winner';
            const shareText = encodeURIComponent(`അഭിനന്ദനങ്ങൾ! അൻവാറുൽ ഇസ്ലാം മദ്രസ വാർഷിക പരീക്ഷയിൽ (2025-26) ${matchedName} വിജയിച്ചിരിക്കുന്നു! 🎉`);
            resultDiv.innerHTML = `<strong>അഭിനന്ദനങ്ങൾ!</strong><br>${matchedName} വിജയിച്ചിരിക്കുന്നു!<br><a class="whatsapp-btn" href="https://wa.me/?text=${shareText}" target="_blank">Share on WhatsApp</a>`;
        } else {
            resultDiv.className = 'not-found';
            resultDiv.innerHTML = `ക്ഷമിക്കണം, ഈ പേര് ലിസ്റ്റിൽ കണ്ടെത്താനായില്ല.`;
        }
    }
</script>

</body>
</html>
