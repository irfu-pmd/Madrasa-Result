<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>അൻവാറുൽ ഇസ്ലാം മദ്രസ - ഫലം</title>
    <style>
        :root {
            --primary-color: #065279;
            --secondary-color: #27ae60;
            --bg-gradient: linear-gradient(135deg, #74b9ff, #a29bfe);
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg-gradient); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background: white; padding: 40px; border-radius: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.2); width: 100%; max-width: 450px; text-align: center; border-top: 8px solid var(--primary-color); }
        h2 { color: var(--primary-color); font-size: 26px; margin-bottom: 5px; }
        .m-title { color: #555; font-size: 14px; letter-spacing: 1px; margin-bottom: 25px; }
        label { display: block; text-align: left; margin: 15px 0 8px; font-weight: 600; color: #333; }
        select, input { width: 100%; padding: 14px; border: 2px solid #eee; border-radius: 12px; font-size: 16px; transition: 0.3s; margin-bottom: 10px; }
        select:focus, input:focus { border-color: var(--primary-color); outline: none; }
        button { background: var(--primary-color); color: white; padding: 16px; border: none; border-radius: 12px; width: 100%; margin-top: 20px; cursor: pointer; font-size: 18px; font-weight: bold; box-shadow: 0 4px 15px rgba(6, 82, 121, 0.3); transition: 0.3s; }
        button:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(6, 82, 121, 0.4); }
        
        #result { margin-top: 30px; padding: 25px; border-radius: 15px; display: none; animation: slideUp 0.5s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .winner { background: #e8f8f0; border: 2px solid #27ae60; color: #1e8449; position: relative; overflow: hidden; }
        .winner h3 { margin: 0; font-size: 22px; }
        .not-found { background: #fdf2f2; border: 2px solid #e74c3c; color: #c0392b; }
        
        .whatsapp-btn { background: #25D366; color: white; padding: 12px 25px; text-decoration: none; border-radius: 30px; display: inline-block; margin-top: 20px; font-weight: bold; font-size: 15px; }
        .emoji { font-size: 30px; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>

<div class="container">
    <h2>അൻവാറുൽ ഇസ്ലാം മദ്രസ</h2>
    <div class="m-title">വാർഷിക പരീക്ഷാ വിജയികൾ 2025-26</div>
    
    <label>ക്ലാസ്സ് തിരഞ്ഞെടുക്കുക</label>
    <select id="class">
        <option value="">-- തിരഞ്ഞെടുക്കുക --</option>
        <option value="1">Class 1</option>
        <option value="2">Class 2</option>
        <option value="3">Class 3</option>
        <option value="4">Class 4</option>
        <option value="6">Class 6</option>
        <option value="8">Class 8</option>
    </select>

    <label>കുട്ടിയുടെ പേര് (In English)</label>
    <input type="text" id="studentName" placeholder="ഉദാ: Faizan">

    <button onclick="checkResult()">RESULT കാണാം</button>

    <div id="result"></div>
</div>

<script>
    const winners = {
        "1": ["Muhammed Faizan PV", "Muhammed Rihan CK", "Muhammed Jalaludheen TT", "Fathima Issah P", "Fathima Hadiya TT"],
        "2": ["Muhammed Saihan K", "Muhammed Ashmil PT", "Fathima Sumayya TT", "Khadija Liyana"],
        "3": ["Haswa Fathima", "Ayisha Sabrin K"],
        "4": ["Muhammed Hadi PV", "Muhammed Aman C", "Haya Fathima PM", "Ansila Mehrin V", "Midha Abdul Kalam P", "Ayisha Nuha K"],
        "6": ["Haniya Fathima A", "Fathima Shahala VT", "Asiya Naila P", "Fathima Rafa TP"],
        "8": ["Muhammed Anas PM", "Muhammed Swalih K", "Fathima Hilfa PT", "Fathima Rinsha TT"]
    };

    function checkResult() {
        const classVal = document.getElementById('class').value;
        const nameInput = document.getElementById('studentName').value.trim().toLowerCase();
        const resultDiv = document.getElementById('result');

        if (!classVal || !nameInput) {
            alert("ദയവായി ക്ലാസ്സും പേരും നൽകുക.");
            return;
        }

        const classWinners = winners[classVal] || [];
        const matchedName = classWinners.find(name => name.toLowerCase().includes(nameInput));

        resultDiv.style.display = 'block';
        if (matchedName) {
            resultDiv.className = 'winner';
            const shareText = encodeURIComponent(`അഭിനന്ദനങ്ങൾ! അൻവാറുൽ ഇസ്ലാം മദ്രസ വാർഷിക പരീക്ഷയിൽ ${matchedName} മികച്ച വിജയം കൈവരിച്ചിരിക്കുന്നു! 🎉🏆`);
            resultDiv.innerHTML = `
                <span class="emoji">🎉 🏆 🌟</span>
                <h3>അഭിനന്ദനങ്ങൾ!</h3>
                <p><strong>${matchedName}</strong> മികച്ച വിജയം കൈവരിച്ചിരിക്കുന്നു.</p>
                <a class="whatsapp-btn" href="https://wa.me/?text=${shareText}" target="_blank">ഇത് ഷെയർ ചെയ്യാം</a>
            `;
        } else {
            resultDiv.className = 'not-found';
            resultDiv.innerHTML = `
                <span class="emoji">😕</span>
                <p>ക്ഷമിക്കണം, <strong>"${nameInput}"</strong> എന്ന പേര് ലിസ്റ്റിൽ കണ്ടെത്താനായില്ല. സ്പെല്ലിംഗ് ശ്രദ്ധിക്കുമല്ലോ.</p>
            `;
        }
    }
</script>

</body>
</html>
