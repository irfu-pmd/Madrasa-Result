<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anwarul Islam Madrasa</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-image: url('bg.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #333;
        }
        .overlay {
            background-color: rgba(255, 255, 255, 0.85); 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            margin-top: 20px;
        }
        .logo {
            width: 150px; 
            height: auto;
        }
        h1 {
            color: #006600; 
            margin-top: 15px;
            font-size: 32px;
        }
        .search-container {
            margin-top: 20px;
            width: 100%;
            max-width: 500px;
            display: flex;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #006600;
            border-radius: 5px 0 0 5px;
            outline: none;
        }
        button {
            padding: 12px 25px;
            font-size: 16px;
            background-color: #006600;
            color: white;
            border: none;
            border-radius: 0 5px 5px 0;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background-color: #004d00;
        }
    </style>
</head>
<body>
    <div class="overlay">
        <div class="header">
            <img src="Madrasa-Logo.png" alt="Madrasa Logo" class="logo">
            <h1>അൻവാറുൽ ഇസ്ലാം മദ്രസ</h1>
        </div>

        <div class="search-container">
            <input type="text" placeholder="മലയാളത്തിലോ ഇംഗ്ലീഷിലോ തിരയുക...">
            <button type="submit">Search</button>
        </div>
    </div>
</body>
</html>
