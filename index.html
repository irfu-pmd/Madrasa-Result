<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>അൻവാറുൽ ഇസ്ലാം മദ്രസ - താഴെ പുല്ലുംകുന്ന്</title>
    <style>
        :root {
            --primary: #065279;
            --gold: #d4af37;
            --green: #1b5e20;
            --white: #ffffff;
            --btn-admission: #2e7d32;
            --btn-result: #01579b;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 0;
            background: #f0f4f8;
            text-align: center;
        }

        header {
            background: var(--primary);
            color: white;
            padding: 30px 20px;
            border-bottom: 5px solid var(--gold);
        }

        .logo { width: 100px; margin-bottom: 10px; }
        h1 { margin: 5px 0; font-size: 26px; font-weight: 900; }
        .reg-no { font-size: 14px; background: var(--gold); color: #000; display: inline-block; padding: 2px 10px; border-radius: 5px; font-weight: bold; margin-bottom: 10px; }
        .board-name { font-size: 15px; opacity: 0.9; font-weight: 500; }

        /* Notice Board */
        .notice-container {
            background: #fff8e1;
            border-bottom: 2px solid var(--gold);
            overflow: hidden;
            display: flex;
            align-items: center;
        }
        .notice-label {
            background: #d32f2f;
            color: white;
            padding: 10px 15px;
            font-weight: bold;
            white-space: nowrap;
            z-index: 2;
        }
        marquee { padding: 10px; font-weight: bold; color: #333; }

        .welcome-card {
            padding: 40px 20px;
            background: white;
            margin: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .btn-container {
            display: flex; flex-direction: column;
            gap: 15px; max-width: 320px;
            margin: 30px auto; padding: 0 20px;
        }

        .main-btn {
            color: white; padding: 18px;
            text-decoration: none; border-radius: 15px;
            font-weight: bold; font-size: 18px;
            display: flex; align-items: center; justify-content: center;
            transition: 0.3s;
        }
        .main-btn:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }

        .btn-admission { background-color: var(--btn-admission); }
        .btn-result { background-color: var(--btn-result); }
        .btn-gallery { background-color: #f5f5f5; color: #333; border: 2px solid var(--primary); }
        .btn-whatsapp { background-color: #25D366; }
        .btn-class { background-color: #673ab7; }

        .staff-section {
            padding: 40px 20px;
            background: #fff;
            margin: 20px;
            border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .staff-title { 
            color: var(--primary); 
            margin-bottom: 25px; 
            border-bottom: 3px solid var(--gold); 
            display: inline-block; 
            padding-bottom: 5px;
            font-size: 24px;
        }

        .staff-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .staff-card {
            background: #f9f9f9;
            padding: 25px;
            border-radius: 15px;
            border-left: 5px solid var(--primary);
            text-align: left;
            transition: 0.3s;
        }
        .staff-name { font-weight: bold; color: #333; display: block; font-size: 18px; }
        .staff-desig { color: var(--green); font-size: 14px; margin-top: 5px; display: block; font-weight: 600; }
        .staff-classes { color: #666; font-size: 14px; margin-top: 8px; display: block; }
        .staff-phone { display: block; margin-top: 10px; color: var(--primary); text-decoration: none; font-weight: bold; font-size: 15px; }

        footer { margin-top: 50px; padding: 40px 20px; background: #1a1a1a; color: white; }
        .contact-link { color: var(--gold); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <h1>അൻവാറുൽ ഇസ്ലാം മദ്രസ</h1>
    <div class="board-name">Under Samastha Kerala Islam Matha Vidyabhyasa Board (SKIMVB)</div>
    <p style="margin-top: 1
