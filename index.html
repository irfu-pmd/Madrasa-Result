<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>അൻവാറുൽ ഇസ്ലാം മദ്രസ - ഫലം</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background: #f0f2f5 url('https://www.transparenttextures.com/patterns/islamic-art.png'); 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; padding: 20px; 
        }
        .container { 
            background: rgba(255, 255, 255, 0.95); 
            padding: 40px; border-radius: 30px; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.15); 
            width: 100%; max-width: 450px; text-align: center; 
            border: 2px solid #065279;
        }
        .header-img { width: 80px; margin-bottom: 15px; }
        h2 { color: #065279; font-size: 24px; margin: 10px 0; font-weight: bold; }
        .year { color: #d35400; font-weight: bold; font-size: 18px; margin-bottom: 20px; }
        
        label { display: block; text-align: left; margin: 15px 0 5px; font-weight: bold; color: #333; }
        select, input { 
            width: 100%; padding: 14px; border: 1.5px solid #bdc3c7; 
            border-radius: 12px; font-size: 16px; margin-bottom: 10px;
        }
        button { 
            background: linear-gradient(to right, #065279, #0a7fb3); 
            color: white; padding: 16px; border: none; border-radius: 12px; 
            width: 100%; margin-top: 20px; cursor: pointer; 
            font-size: 18px; font-weight: bold; transition: 0.3s;
        }
        button:hover { opacity: 0.9; transform: scale(1.02); }

        #result { margin-top: 30px; display: none; animation: fadeIn 0.8s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .winner-card { 
            background: #fff; border: 3px solid #f1c40f; 
            padding: 25px; border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(241, 196, 15, 0.2);
        }
        .winner-card h3 { color: #27ae60; margin: 0; font-size: 22px; }
        .winner-card p { font-size: 18px; color: #2c3e50; font-weight: bold; }

        .whatsapp-btn { 
            background: #25D366; color: white; padding: 12px 20px; 
            text-decoration: none; border-radius: 50px; 
            display: inline-block; margin-top: 15px; font-weight: bold;
        }
        .not-found { color: #e74c3c; font-weight: bold; padding: 15px; }
    </style>
</head>
<body>

<div class="container">
    <img src="https://cdn-icons-png.flaticon.com/512/2641/2641320.png" class="header-img" alt="Madrasa Icon">
    <h2>അൻവാറുൽ ഇസ്ലാം മദ്രസ</h2>
    <div class="year">Annual Results 2025-26</div>
    
    <label>ക്ലാസ്സ് തിരഞ്ഞെടുക്കുക</label>
    <select id="class">
        <option value="">-- തിരഞ്ഞെടുക്കുക --</option>
        <option value="1">Class 1</option>
        <option value="2">Class 2</option>
        <option value="3">Class 3</option>
        <option value="4">Class 4</option>
        <option value="6">Class 6</option>
        <option value="8">Class 8</option>
    </select>

    <label>കുട്ടിയുടെ പേര് (English)</label>
    <input type="text" id="studentName" placeholder="ഉദാഹരണത്തിന്: Faizan">

    <button onclick="checkResult()">RESULT നോക്കാം</button>

    <div id="result"></div>
</div>

<script>
    const winners = {
        "1": ["Muhammed Faizan PV", "Muhammed Rihan CK", "Muhammed Jalaludheen TT", "Fathima Issah P", "Fathima Hadiya TT"],
        "2": ["Muhammed Saihan K", "Muhammed Ashmil PT", "Fathima Sumayya TT", "Khadija Liyana"],
        "3": ["Haswa Fathima", "Ayisha Sabrin K"],
        "4": ["Muhammed Hadi PV", "Muhammed Aman C", "Haya Fathima PM", "Ansila Mehrin V", "Midha Abdul Kalam P", "Ayisha Nuha K"],
        "6": ["Haniya Fathima A", "Fathima Shahala VT", "Asiya Naila P", "Fathima Rafa TP"],
        "8": ["Muhammed Anas PM", "Muhammed Swalih K", "Fathima Hilfa PT", "Fathima Rinsha TT"]
    };

    function checkResult() {
        const classVal = document.getElementById('class').value;
        const nameInput = document.getElementById('studentName').value.trim().toLowerCase();
        const resultDiv = document.getElementById('result');

        if (!classVal || !nameInput) {
            alert("ദയവായി ക്ലാസ്സും പേരും നൽകുക.");
            return;
        }

        const classWinners = winners[classVal] || [];
        const matchedName = classWinners.find(name => name.toLowerCase().includes(nameInput));

        resultDiv.style.display = 'block';
        if (matchedName) {
            const shareText = encodeURIComponent(`അഭിനന്ദനങ്ങൾ! അൻവാറുൽ ഇസ്ലാം മദ്രസ പരീക്ഷയിൽ ${matchedName} വിജയിച്ചിരിക്കുന്നു! 🎉`);
            resultDiv.innerHTML = `
                <div class="winner-card">
                    <span style="font-size: 40px;">🎊</span>
                    <h3>അഭിനന്ദനങ്ങൾ!</h3>
                    <p>${matchedName}</p>
                    <div style="color: #555;">വിജയിച്ചിരിക്കുന്നു!</div>
                    <a class="whatsapp-btn" href="https://wa.me/?text=${shareText}" target="_blank">WhatsApp വഴി ഷെയർ ചെയ്യാം</a>
                </div>
            `;
        } else {
            resultDiv.innerHTML = `<div class="not-found">ക്ഷമിക്കണം, ഈ പേര് ലിസ്റ്റിൽ കണ്ടെത്താനായില്ല. സ്പെല്ലിംഗ് ശ്രദ്ധിക്കുമല്ലോ.</div>`;
        }
    }
</script>

</body>
</html>
