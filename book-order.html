<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ബുക്ക് ഓർഡർ - അൻവാറുൽ ഇസ്‌ലാം മദ്രസ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #065279; --secondary: #27ae60; --accent: #f39c12; --bg: #f4f7f6; --github-green: #1f883d; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); margin: 0; padding-bottom: 100px; }
        header { background: var(--primary); color: white; padding: 20px; text-align: center; border-radius: 0 0 25px 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); position: relative; }
        .container { max-width: 600px; margin: 20px auto; padding: 0 15px; }
        .filter-section { background: white; padding: 20px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); text-align: center; }
        select { width: 100%; padding: 12px; border-radius: 10px; border: 2px solid #ddd; font-size: 16px; margin-bottom: 15px; font-weight: bold; }
        
        .select-all-btn { background: var(--github-green); color: white; border: none; padding: 16px; border-radius: 10px; width: 100%; font-weight: 800; font-size: 16px; cursor: pointer; display: none; align-items: center; justify-content: center; gap: 10px; }

        .book-list { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-top: 20px; display: none; }
        .book-row { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #eee; transition: 0.3s; cursor: pointer; }
        .book-row.selected { background-color: #e8f5e9; }
        .checkbox-col { margin-right: 15px; }
        input[type="checkbox"] { width: 22px; height: 22px; cursor: pointer; accent-color: var(--secondary); }
        .book-info { flex-grow: 1; }
        .book-name { font-weight: bold; font-size: 15px; color: #2c3e50; }
        .mandatory-tag { font-size: 10px; color: #d35400; font-weight: bold; display: block; }
        .book-price { font-weight: 800; color: #444; font-size: 16px; }

        /* Cart Modal */
        #cartModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; overflow-y: auto; }
        .cart-content { background: white; width: 90%; max-width: 500px; margin: 30px auto; border-radius: 20px; padding: 25px; position: relative; }
        .close-modal { position: absolute; top: 15px; right: 15px; font-size: 24px; cursor: pointer; }
        .form-input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        
        .payment-info-box { background: #fff3cd; border: 1px solid #ffeeba; color: #856404; padding: 15px; border-radius: 10px; font-size: 13px; margin-top: 15px; text-align: center; font-weight: bold; line-height: 1.6; }
        
        .order-btn { background: #25D366; color: white; width: 100%; padding: 15px; border-radius: 12px; border: none; font-size: 16px; font-weight: bold; margin-top: 20px; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; }
        
        .sticky-footer { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 15px 20px; border-top: 2px solid #eee; display: none; justify-content: space-between; align-items: center; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); z-index: 100; }
        .footer-total { font-weight: 900; font-size: 22px; color: #222; }
    </style>
</head>
<body>

<header>
    <h1 style="margin:0; font-size: 18px;">മദ്രസ ഓൺലൈൻ ബുക്ക് ഷോപ്പ്</h1>
</header>

<div class="container">
    <div class="filter-section">
        <label style="display:block; margin-bottom:10px; font-weight:bold; font-size: 18px; color: #333;">ക്ലാസ് Select ചെയ്യുക</label>
        <select id="classSelector" onchange="renderBooks()">
            <option value="" selected disabled>-- Select --</option>
            <option value="1">ക്ലാസ്സ് 1 (I)</option>
            <option value="2">ക്ലാസ്സ് 2 (II)</option>
            <option value="3">ക്ലാസ്സ് 3 (III)</option>
            <option value="4">ക്ലാസ്സ് 4 (IV)</option>
            <option value="5">ക്ലാസ്സ് 5 (V)</option>
            <option value="6">ക്ലാസ്സ് 6 (VI)</option>
            <option value="7">ക്ലാസ്സ് 7 (VII)</option>
            <option value="8">ക്ലാസ്സ് 8 (VIII)</option>
        </select>
        <button id="selectAllBtn" class="select-all-btn" onclick="selectAll()">
            <i class="fa-solid fa-circle-check"></i> സെറ്റ് മുഴുവനായി തിരഞ്ഞെടുക്കുക
        </button>
    </div>
    <div id="bookList" class="book-list"></div>
</div>

<div id="stickyFooter" class="sticky-footer">
    <div>
        <span style="font-size:12px; color:#777; font-weight:bold;">ആകെ തുക:</span><br>
        <span class="footer-total" id="footerTotal">₹ 0</span>
    </div>
    <button onclick="openCart()" style="background:var(--primary); color:white; padding:15px 25px; border-radius:12px; border:none; font-weight:bold;">ഓർഡർ ചെയ്യുക <i class="fa-solid fa-arrow-right"></i></button>
</div>

<div id="cartModal">
    <div class="cart-content">
        <span class="close-modal" onclick="closeCart()">&times;</span>
        <h3 style="color:var(--primary); margin-top:0;">ഓർഡർ പൂർത്തിയാക്കുക</h3>
        
        <div style="background:#f9f9f9; padding:15px; border-radius:12px; margin-bottom: 15px;">
            <input type="text" id="custName" class="form-input" placeholder="വിദ്യാർത്ഥിയുടെ പേര്">
            <input type="tel" id="custPhone" class="form-input" placeholder="ഫോൺ നമ്പർ">
        </div>

        <div class="payment-info-box">
            ⚠️ താഴെയുള്ള ബട്ടൺ ക്ലിക്ക് ചെയ്ത് വാട്സാപ്പിലൂടെ ഓർഡർ നൽകുക.<br><br>
            പണമടച്ച ശേഷം സ്ക്രീൻഷോട്ട് <strong>9061969505</strong> എന്ന നമ്പറിലേക്ക് അയക്കാൻ മറക്കരുത്.
        </div>

        <button class="order-btn" onclick="sendWhatsAppOrder()">
            <i class="fa-brands fa-whatsapp"></i> വാട്സാപ്പിൽ ഓർഡർ നൽകാം
        </button>
    </div>
</div>

<script>
    const whatsappNumber = "919061969505"; // നിങ്ങളുടെ വാട്സാപ്പ് നമ്പർ
    const diaryItem = { name: "മദ്രസ ഡയറി (Mandatory)", price: 25, mandatory: true };
    const booksData = {
        1: [{name: "തഫ്ഹീം പാർട്ട് 1-i", price: 180}, {name: "തഫ്ഹീം പാർട്ട് 2-i", price: 110}, {name: "ദുറൂസ്-i", price: 70}],
        2: [{name: "ഫിഖ്ഹ്-ii", price: 90}, {name: "ദുറൂസ്-ii", price: 70}, {name: "ലിസാൻ-ii", price: 80}, {name: "അഖീദ-ii", price: 70}],
        3: [{name: "തർബിയത്തുത്തിലാവ-iii", price: 90}, {name: "അഖീദ-iii", price: 60}, {name: "ഫിഖ്ഹ്-iii", price: 80}, {name: "ദുറൂസ്-iii", price: 70}, {name: "താരീഖ്-iii", price: 80}, {name: "ലിസാൻ-iii", price: 90}],
        4: [{name: "ദുറൂസ്-iv", price: 70}, {name: "താരീഖ്-iv", price: 70}, {name: "ഫിഖ്ഹ്-iv", price: 90}, {name: "അഖീദ-iv", price: 60}, {name: "തർബിയത്തുത്തിലാവ-iv", price: 90}, {name: "ലിസാൻ-iv", price: 90}],
        5: [{name: "ദുറൂസ്-v", price: 60}, {name: "താരീഖ്-v", price: 70}, {name: "ഫിഖ്ഹ്-v", price: 100}, {name: "തജ്‌വീദ്-v", price: 80}, {name: "ലിസാൻ-v", price: 90}],
        6: [{name: "ദുറൂസ്-vi", price: 70}, {name: "താരീഖ്-vi", price: 70}, {name: "ഫിഖ്ഹ്-vi", price: 90}, {name: "തജ്‌വീദ്-vi", price: 80}, {name: "ലിസാൻ-vi", price: 90}, {name: "ഉപ പാഠ പുസ്തകം-vi", price: 50}],
        7: [{name: "ദുറൂസ്-vii", price: 60}, {name: "താരീഖ്-vii", price: 60}, {name: "ഫിഖ്ഹ്-vii", price: 80}, {name: "തജ്‌വീദ്-vii", price: 70}, {name: "ലിസാൻ-vii", price: 90}, {name: "ഉപ പാഠ പുസ്തകം-vii", price: 50}],
        8: [{name: "ദുറൂസ്-viii", price: 60}, {name: "താരീഖ്-viii", price: 70}, {name: "ഫിഖ്ഹ്-viii", price: 80}, {name: "ലിസാൻ-viii", price: 100}, {name: "ഉപ പാഠ പുസ്തകം-viii", price: 50}]
    };

    function renderBooks() {
        const cls = document.getElementById('classSelector').value;
        if(!cls) return;
        document.getElementById('selectAllBtn').style.display = 'flex';
        document.getElementById('bookList').style.display = 'block';
        document.getElementById('stickyFooter').style.display = 'flex';
        const listDiv = document.getElementById('bookList');
        listDiv.innerHTML = "";
        listDiv.appendChild(createRow(diaryItem, true));
        booksData[cls].forEach(book => listDiv.appendChild(createRow(book, false)));
        updateTotal();
    }

    function createRow(book, isMandatory) {
        const row = document.createElement('div');
        row.className = 'book-row' + (isMandatory ? ' selected' : '');
        row.innerHTML = `<div class="checkbox-col"><input type="checkbox" class="book-check" data-name="${book.name}" data-price="${book.price}" ${isMandatory ? 'checked disabled' : 'onchange="handleCheck(this)"'}></div><div class="book-info">${isMandatory ? '<span class="mandatory-tag">MANDATORY</span>' : ''}<span class="book-name">${book.name}</span></div><div class="book-price">₹${book.price}</div>`;
        if (!isMandatory) { row.onclick = function(e) { if(e.target.type !== 'checkbox') { const cb = row.querySelector('.book-check'); cb.checked = !cb.checked; handleCheck(cb); } }; }
        return row;
    }

    function handleCheck(cb) { cb.closest('.book-row').classList.toggle('selected', cb.checked); updateTotal(); }
    function selectAll() { document.querySelectorAll('.book-check').forEach(cb => { cb.checked = true; cb.closest('.book-row').classList.add('selected'); }); updateTotal(); }
    
    function updateTotal() {
        let total = 0;
        document.querySelectorAll('.book-check:checked').forEach(cb => total += parseInt(cb.dataset.price));
        document.getElementById('footerTotal').innerText = '₹ ' + total;
    }

    function openCart() { document.getElementById('cartModal').style.display = 'block'; }
    function closeCart() { document.getElementById('cartModal').style.display = 'none'; }
    
    function sendWhatsAppOrder() {
        const name = document.getElementById('custName').value;
        const phone = document.getElementById('custPhone').value;
        const cls = document.getElementById('classSelector').value;
        if (!name || !phone) { alert("ദയവായി വിദ്യാർത്ഥിയുടെ പേരും ഫോൺ നമ്പറും നൽകുക"); return; }
        
        let total = 0, msg = `*പുതിയ ബുക്ക് ഓർഡർ*\n----------\n*പേര്:* ${name}\n*ഫോൺ:* ${phone}\n*ക്ലാസ്:* ${cls}\n\n*തിരഞ്ഞെടുത്ത പുസ്തകങ്ങൾ:*\n`;
        document.querySelectorAll('.book-check:checked').forEach((cb, i) => { 
            msg += `${i+1}. ${cb.dataset.name} - ₹${cb.dataset.price}\n`; 
            total += parseInt(cb.dataset.price); 
        });
        msg += `\n*ആകെ തുക: ₹${total}*\n----------\n_പണമടച്ച ശേഷം സ്ക്രീൻഷോട്ട് ഈ നമ്പറിലേക്ക് തന്നെ അയക്കുക._`;
        window.open(`https://wa.me/${whatsappNumber}?text=${encodeURIComponent(msg)}`, '_blank');
    }
</script>
</body>
</html>
