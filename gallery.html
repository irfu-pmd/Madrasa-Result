<head>

    <title>ഗാലറി - അൻവാറുൽ ഇസ്ലാം മദ്രസ</title>
    <style>
        :root {
            --primary: #065279;
            --gold: #d4af37;
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f7f6; text-align: center; }
        
        header { 
            background: var(--primary); 
            color: white; 
            padding: 30px 20px; 
            border-bottom: 5px solid var(--gold); 
        }

        h1 { margin: 0; font-size: 24px; }
        .sub-title { font-size: 14px; opacity: 0.8; margin-top: 5px; }

        .gallery-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 20px; 
            padding: 30px 20px; 
            max-width: 1200px; 
            margin: 0 auto;
        }

        .gallery-item { 
            background: white; 
            padding: 10px; 
            border-radius: 15px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); 
            transition: 0.3s;
        }

        .gallery-item img { 
            width: 100%; 
            height: 250px; 
            object-fit: cover; 
            border-radius: 10px; 
        }

        .back-btn { 
            display: inline-block; 
            margin: 30px 0; 
            padding: 15px 30px; 
            background: var(--primary); 
            color: white; 
            text-decoration: none; 
            border-radius: 30px; 
            font-weight: bold;
        }
    </style>
</head>
