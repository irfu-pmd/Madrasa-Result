<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ഗാലറി - അൻവാറുൽ ഇസ്ലാം മദ്രസ</title>
    <style>
        :root {
            --primary: #065279;
            --gold: #d4af37;
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f7f6; text-align: center; }
        
        header { 
            background: var(--primary); 
            color: white; 
            padding: 30px 20px; 
            border-bottom: 5px solid var(--gold); 
        }

        h1 { margin: 0; font-size: 24px; }

        .gallery-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 20px; 
            padding: 30px 20px; 
            max-width: 1200px; 
            margin: 0 auto;
        }

        .gallery-item { 
            background: white; 
            padding: 10px; 
            border-radius: 15px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); 
            transition: 0.3s;
        }

        .gallery-item:hover { transform: translateY(-5px); }

        .gallery-item img { 
            width: 100%; 
            height: 250px; 
            object-fit: cover; 
            border-radius: 10px; 
        }

        .gallery-item p { 
            margin-top: 10px; 
            font-weight: bold; 
            color: var(--primary); 
        }

        .back-btn { 
            display: inline-block; 
            margin: 30px 0; 
            padding: 15px 30px; 
            background: var(--primary); 
            color: white; 
            text-decoration: none; 
            border-radius: 30px; 
            font-weight: bold;
        }
    </style>
</head>
<body>

<header>
    <h1>വിജയികൾക്ക് സമ്മാനദാനം</h1>
    <p>അൻവാറുൽ ഇസ്ലാം മദ്രസ, താഴെ പുല്ലുംകുന്ന്</p>
</header>

<div class="gallery-container">

    <div class="gallery-item"><img src="2.jpg" alt="Gift Distribution"><p>സമ്മാനദാനം - 2</p></div>
    <div class="gallery-item"><img src="3.jpg" alt="Gift Distribution"><p>സമ്മാനദാനം - 3</p></div>
    <div class="gallery-item"><img src="4.jpg" alt="Gift Distribution"><p>സമ്മാനദാനം - 4</p></div>
    <div class="gallery-item"><img src="5.jpg" alt="Gift Distribution"><p>സമ്മാനദാനം - 5</p></div>
    <div class="gallery-item"><img src="6.jpg" alt="Gift Distribution"><p>സമ്മാനദാനം - 6</p></div>
    <div class="gallery-item"><img src="7.jpg" alt="Gift Distribution"><p>സമ്മാനദാനം - 7</p></div>

</div>

</html>
