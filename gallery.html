<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ഗാലറി - അൻവാറുൽ ഇസ്ലാം മദ്രസ</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f7f6; text-align: center; }
        header { background: #065279; color: white; padding: 20px; border-bottom: 5px solid #d4af37; }
        .gallery-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; padding: 20px; }
        .gallery-item { background: white; padding: 10px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .gallery-item img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; }
        .back-btn { display: inline-block; margin-top: 20px; padding: 10px 20px; background: #065279; color: white; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>
    <header>
        <h1>മദ്രസ ഗാലറി</h1>
        <p>ഞങ്ങളുടെ മനോഹരമായ നിമിഷങ്ങൾ</p>
    </header>

    <div class="gallery-container">
        <div class="gallery-item">
            <img src="bg.jpg" alt="Madrasa Photo 1">
            <p>മദ്രസ കെട്ടിടം</p>
        </div>
    </div>

    <a href="index.html" class="back-btn">തിരികെ ഹോം പേജിലേക്ക്</a>
</body>
</html>
